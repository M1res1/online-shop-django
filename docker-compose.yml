services:

  web:
    image: ghcr.io/m1res1/online-shop-django:latest
    container_name: shop_web
    restart: unless-stopped
    env_file: .env
    volumes:
      - sqlite_data:/app/db_vol
      - media_data:/app/media
      - static_data:/app/staticfiles
    expose:
      - "8000"
    networks:
      - shop_net

  nginx:
    image: nginx:1.25-alpine
    container_name: shop_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web
    networks:
      - shop_net

  # ── Monitoring ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: shop_prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    expose:
      - "9090"
    networks:
      - shop_net

  node-exporter:
    image: prom/node-exporter:latest
    container_name: shop_node_exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    expose:
      - "9100"
    networks:
      - shop_net

  grafana:
    image: grafana/grafana:latest
    container_name: shop_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana.ini:/etc/grafana/grafana.ini:ro
    depends_on:
      - prometheus
    networks:
      - shop_net

volumes:
  sqlite_data:
  media_data:
  static_data:
  prometheus_data:
  grafana_data:

networks:
  shop_net:
    driver: bridge